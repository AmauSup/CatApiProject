openapi: 3.0.3
info:
  title: CatApiProject API
  version: 1.0.0
  description: API REST pour gestion de chats, favoris, votes, tournoi, utilisateurs.
servers:
  - url: http://localhost:5050/api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        email: { type: string }
    Animal:
      type: object
      properties:
        id: { type: integer }
        api_id: { type: string }
        animal_type: { type: string }
        breed_id: { type: string }
        breed_name: { type: string }
        image_url: { type: string }
        weight_metric: { type: string }
        life_span: { type: string }
        temperament: { type: string }
    Favorite:
      type: object
      properties:
        user_id: { type: integer }
        animal_id: { type: integer }
    Vote:
      type: object
      properties:
        user_id: { type: integer }
        animal_id: { type: integer }
        value: { type: string }
    BreedStat:
      type: object
      properties:
        breed_id: { type: string }
        breed_name: { type: string }
        animal_type: { type: string }
        total_votes: { type: integer }
        upvotes: { type: integer }
        downvotes: { type: integer }
        updated_at: { type: string, format: date-time }

security:
  - bearerAuth: []

paths:
  /auth/signup:
    post:
      summary: Inscription utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username: { type: string }
                email: { type: string }
                password: { type: string }
      responses:
        '201':
          description: Utilisateur créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        '409':
          description: Email déjà utilisé
        '400':
          description: Champs manquants

  /auth/login:
    post:
      summary: Connexion utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        '401':
          description: Email ou mot de passe invalide

  /cats/random:
    get:
      summary: Obtenir des chats aléatoires
      parameters:
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        '200':
          description: Liste de chats
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Animal' }

  /cats/search:
    get:
      summary: Recherche de chats
      parameters:
        - in: query
          name: breedId
          schema: { type: string }
        - in: query
          name: categoryId
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: excludeIds
          schema: { type: string }
      responses:
        '200':
          description: Résultats de recherche
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Animal' }
        '404':
          description: Aucun chat trouvé

  /cats/animal-id:
    get:
      summary: Obtenir l'id interne d'un animal par api_id
      parameters:
        - in: query
          name: api_id
          schema: { type: string }
          required: true
      responses:
        '200':
          description: Id trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
        '404':
          description: Animal non trouvé

  /cats/breeds:
    get:
      summary: Liste des races
      responses:
        '200':
          description: Liste des races
          content:
            application/json:
              schema:
                type: array
                items: { type: object }

  /cats/categories:
    get:
      summary: Liste des catégories
      responses:
        '200':
          description: Liste des catégories
          content:
            application/json:
              schema:
                type: array
                items: { type: object }

  /cats/image/{id}:
    get:
      summary: Image d'un chat par id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Image trouvée
        '404':
          description: Chat non trouvé

  /cats/breed-stats:
    get:
      summary: Statistiques de votes par race
      responses:
        '200':
          description: Statistiques
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/BreedStat' }

  /favorites:
    get:
      summary: Liste des favoris de l'utilisateur
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des favoris
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Animal' }
        '401':
          description: Non authentifié

    post:
      summary: Ajouter un favori
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [animal_id]
              properties:
                animal_id: { type: integer }
      responses:
        '200':
          description: Ajouté aux favoris
        '401':
          description: Non authentifié

    delete:
      summary: Retirer un favori
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [animal_id]
              properties:
                animal_id: { type: integer }
      responses:
        '200':
          description: Retiré des favoris
        '401':
          description: Non authentifié

  /votes:
    post:
      summary: Voter pour un chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [animal_id, voteType]
              properties:
                animal_id: { type: integer }
                voteType: { type: string, enum: [like, dislike, skip] }
      responses:
        '200':
          description: Vote enregistré
        '400':
          description: Requête invalide

  /tournoi/start:
    post:
      summary: Démarrer un tournoi
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                breedIds:
                  type: array
                  items: { type: string }
      responses:
        '201':
          description: Tournoi démarré

  /tournoi:
    get:
      summary: Récupérer l'état du tournoi
      responses:
        '200':
          description: Etat du tournoi

    delete:
      summary: Supprimer le tournoi
      responses:
        '204':
          description: Tournoi supprimé

  /tournoi/vote:
    post:
      summary: Voter pour un match de tournoi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [matchId, winnerId]
              properties:
                matchId: { type: integer }
                winnerId: { type: integer }
      responses:
        '200':
          description: Vote enregistré

  /tournoi/bracket:
    get:
      summary: Récupérer l'arborescence du tournoi
      responses:
        '200':
          description: Bracket du tournoi